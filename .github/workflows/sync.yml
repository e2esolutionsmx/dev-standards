name: Sync Standards Files

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.eslintrc.json'
      - 'sync.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run GitHub File Sync
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ secrets.GH_PAT }}
          CONFIG_PATH: sync.yml
          PR_LABELS: |
            standards-sync
          COMMIT_PREFIX: "chore(standards): "
          COMMIT_BODY: "Sincronización automática desde org/dev-standards"